---
modules:
  - .llms # docassemble.ALToolbox.llms
---
id: interview order
mandatory: True
code: |
  openai_base_url = get_config("open ai",{}).get("base url") or get_config("openai base url") or "https://api.openai.com/v1/"
  is_azure_openai = "openai.azure.com" in str(openai_base_url).lower()
  open_ai_config = get_config("open ai", {}) or {}
  configured_default_model = (
    open_ai_config.get("default small model")
    or get_config("openai default small model")
    or open_ai_config.get("default model")
    or get_config("openai default model")
  )

  if is_azure_openai:
    # Azure OpenAI model listing can include catalog models that are not deployed.
    # Prefer configured deployment names for demo choices.
    openai_model_choices = [configured_default_model] if configured_default_model else []
    first_small_model = configured_default_model
  else:
    openai_model_choices = [
      "gpt-5-nano",
      "gpt-5-mini",
      "gpt-5",
      "gpt-4o-mini",
      "gpt-4o",
    ]
    if configured_default_model and configured_default_model not in openai_model_choices:
      openai_model_choices = [configured_default_model] + openai_model_choices
    first_small_model = configured_default_model or "gpt-5-nano"

  if openai_model_choices:
    system_message
    process_input
    show_results
  else:
    show_ai_not_configured
---
id: ask_for_input
question: |
  Enter an instruction and text to transform
subquestion: |
  This screen lets you experiment with the OpenAI API. It works
  like the OpenAI playground.

  Enter a system instruction and text to transform.

  For example, you could enter a system instruction of:
  
  ```
  Rewrite the input to 
  a 6th grade reading level
  ``` 
  
  and text of 

  ```
  In accordance with the stipulations set forth in Section 4, Subsection 3.2 of the Company's Operational Handbook, it is incumbent upon all employees to meticulously submit their individualized timekeeping records for the preceding month no later than the fifth business day of the ensuing month. Failure to comply with this mandate may result in a sequential series of remedial actions as outlined in the Employee Disciplinary Policy, commencing with a formal written reprimand and potentially culminating in termination of employment, contingent upon the recurrent nature of the non-compliance and the discretion of the departmental supervisor in consultation with the Human Resources Department, pursuant to company policy and applicable labor laws.
  ```

  It may help to include an instruction like "reply only with the changed text" in your system
  instruction to avoid extraneous information in the response.
fields:
  - System instructions: system_message
    datatype: area
  - Text to transform: user_message
    datatype: area
  - Creativity (temperature): temperature
    datatype: range
    min: 0
    max: 1
    default: 0.5
    step: 0.05
    help: |
      The higher the temperature, the more creative the response. The lower the temperature, the more predictable the response.
  - Provider: provider
    datatype: radio
    choices:
      - OpenAI: ${ openai_base_url }
      - Google Gemini: "https://generativelanguage.googleapis.com/v1beta/openai/"
  - Model: model
    datatype: combobox
    code: |
      openai_model_choices
    default: ${ first_small_model }
    help: |
      The model to use for the chat completion. On Azure OpenAI, this should be your deployment name.
      The default is the smallest available model when discovery is supported.
    show if:
      variable: provider
      is: ${get_config("open ai",{}).get("base url") or get_config("openai base url") or "https://api.openai.com/v1/"}
  - Model: model
    datatype: combobox
    choices:
      - "gemini-2.5-flash"
      - "gemini-2.5-flash-lite"
      - "gemini-2.5-pro"
    default: gemini-2.5-flash
    show if:
      variable: provider
      is: "https://generativelanguage.googleapis.com/v1beta/openai/"
---
code: |
  results = chat_completion(
    system_message,
    user_message,
    temperature=temperature,
    # The following are optional parameters shown for demonstration purposes
    model=model,
    json_mode=False,
    openai_base_url=provider,
    # default comes from config otherwise
    openai_api = get_config("google gemini api key") if provider == "https://generativelanguage.googleapis.com/v1beta/openai/" else None,
  )
  process_input = True
---
event: show_results
question: |
  Here are your results
subquestion: |
  ${ single_to_double_newlines(results) }
---
event: show_ai_not_configured
question: |
  AI is not configured
subquestion: |
  This demo requires a working AI model, but none is currently available.

  Add a valid API key and provider configuration (for example, in `open ai` settings), then try again.
